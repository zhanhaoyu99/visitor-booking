services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: visitor_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/visitor_booking
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-please-change-this-to-a-random-string-32}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
